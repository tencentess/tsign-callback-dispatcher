version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: tsign-dispatcher-backend
    restart: unless-stopped
    # In production, do NOT expose backend port directly.
    # Backend is accessed only via nginx reverse proxy.
    # Uncomment the following for local debugging:
    # ports:
    #   - "3001:3001"
    volumes:
      - ../config:/app/config
      - ../logs:/app/logs
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-admin123}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: tsign-dispatcher-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
