apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsign-dispatcher-frontend
  namespace: default
  labels:
    app: tsign-dispatcher
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tsign-dispatcher
      component: frontend
  template:
    metadata:
      labels:
        app: tsign-dispatcher
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ccr.ccs.tencentyun.com/pulse-line-prod/tsign-dispatcher-frontend:latest
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_UPSTREAM
              value: "tsign-dispatcher-backend.default.svc.cluster.local:3001"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
