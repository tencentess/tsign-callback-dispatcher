# ============================================================
# TLS Configuration for tsign-dispatcher
# ============================================================
# 本文件提供两种 TLS 方案供参考：
#   方案 A: cert-manager 自动签发证书（推荐）
#   方案 B: 手动管理证书
#
# 前置条件（方案 A）:
#   1. 安装 cert-manager:
#      kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   2. 确认 cert-manager 运行正常:
#      kubectl get pods -n cert-manager
#
# Usage:
#   kubectl apply -f tls.yaml
#   然后更新 ingress.yaml 中的 TLS 配置
# ============================================================

# ────────────────────────────────────────────────────────────
# 方案 A: cert-manager 自动签发（推荐生产使用）
# ────────────────────────────────────────────────────────────

# ── ClusterIssuer: Let's Encrypt Production ──
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app: tsign-dispatcher
spec:
  acme:
    # 替换为你的邮箱，用于证书到期通知
    email: admin@your-domain.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # HTTP-01 验证方式（需要 Ingress Controller 支持）
      - http01:
          ingress:
            class: nginx

---
# ── ClusterIssuer: Let's Encrypt Staging（测试用，避免触发速率限制）──
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app: tsign-dispatcher
spec:
  acme:
    email: admin@your-domain.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ── Certificate: 自动签发的 TLS 证书 ──
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tsign-dispatcher-tls
  namespace: default
  labels:
    app: tsign-dispatcher
spec:
  # 生成的 TLS Secret 名称（与 Ingress 中引用一致）
  secretName: tsign-dispatcher-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  # 证书域名 — 替换为你的实际域名
  dnsNames:
    - tsign-dispatcher.your-domain.com
  # 证书自动续期设置
  duration: 2160h      # 90 天
  renewBefore: 360h    # 到期前 15 天自动续期
  privateKey:
    algorithm: ECDSA
    size: 256

# ────────────────────────────────────────────────────────────
# 方案 B: 手动管理证书
# ────────────────────────────────────────────────────────────
# 如果不使用 cert-manager，可以手动创建 TLS Secret:
#
#   kubectl create secret tls tsign-dispatcher-tls \
#     --cert=path/to/tls.crt \
#     --key=path/to/tls.key \
#     -n default
#
# 或使用如下 YAML（需替换 base64 编码的证书和密钥）:
#
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: tsign-dispatcher-tls
#   namespace: default
#   labels:
#     app: tsign-dispatcher
# type: kubernetes.io/tls
# data:
#   tls.crt: <BASE64_ENCODED_CERTIFICATE>
#   tls.key: <BASE64_ENCODED_PRIVATE_KEY>

# ────────────────────────────────────────────────────────────
# Ingress TLS 配置参考
# ────────────────────────────────────────────────────────────
# 在 ingress.yaml 中启用 TLS，取消注释以下部分:
#
# metadata:
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-prod       # 方案 A
#     nginx.ingress.kubernetes.io/ssl-redirect: "true"       # 强制 HTTPS
#     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
#     nginx.ingress.kubernetes.io/hsts: "true"
#     nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
#     nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
# spec:
#   tls:
#     - hosts:
#         - tsign-dispatcher.your-domain.com
#       secretName: tsign-dispatcher-tls
#   rules:
#     - host: tsign-dispatcher.your-domain.com
#       ...
