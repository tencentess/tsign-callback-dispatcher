apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsign-dispatcher-backend
  namespace: default
  labels:
    app: tsign-dispatcher
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tsign-dispatcher
      component: backend
  template:
    metadata:
      labels:
        app: tsign-dispatcher
        component: backend
    spec:
      serviceAccountName: tsign-dispatcher-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ccr.ccs.tencentyun.com/pulse-line-prod/tsign-dispatcher-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: debug
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tsign-dispatcher-secret
                  key: JWT_SECRET
            - name: ADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tsign-dispatcher-secret
                  key: ADMIN_DEFAULT_PASSWORD
            - name: JWT_EXPIRES_IN
              value: "24h"
            - name: WAL_DIR
              value: /app/data/wal
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: logs
              mountPath: /app/logs
            - name: wal-data
              mountPath: /app/data/wal
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: tsign-dispatcher-config
        - name: logs
          emptyDir: {}
        - name: wal-data
          hostPath:
            path: /data/tsign-dispatcher/wal
            type: DirectoryOrCreate
