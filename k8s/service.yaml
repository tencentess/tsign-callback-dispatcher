apiVersion: v1
kind: Service
metadata:
  name: tsign-dispatcher-backend
  namespace: default
  labels:
    app: tsign-dispatcher
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: tsign-dispatcher
    component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: tsign-dispatcher-frontend
  namespace: default
  labels:
    app: tsign-dispatcher
    component: frontend
spec:
  # Changed from LoadBalancer to ClusterIP for security.
  # Access via Ingress instead of direct LoadBalancer exposure.
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: tsign-dispatcher
    component: frontend
